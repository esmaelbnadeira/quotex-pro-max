<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AngolaCoiners PREMIUM</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:url('login-bg.jpg') no-repeat center/cover;height:100vh;color:#fff;overflow:hidden}
.overlay{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px)}
.container{position:relative;z-index:2;height:100%;display:flex;justify-content:center;align-items:center}
.card{background:rgba(0,0,0,0.85);padding:40px;border-radius:20px;width:350px;animation:fade 1s;box-shadow:0 0 30px rgba(255,215,0,0.4)}
h2{text-align:center;color:gold;margin-bottom:20px}
input,select,button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px}
button{background:gold;color:#000;font-weight:bold;cursor:pointer;transition:.3s}
button:hover{transform:scale(1.05)}
.dashboard{display:none;height:100%;padding:20px}
.top{display:flex;justify-content:space-between;margin-bottom:20px}
.timer{color:gold;font-weight:bold}
.signal{background:#111;padding:20px;border-radius:15px;margin-top:20px}
.history{margin-top:20px;max-height:150px;overflow:auto}
.history div{background:#1a1a1a;padding:8px;margin-top:5px;border-radius:5px;font-size:12px}
.status{color:#00ff88;font-size:12px}
.loader{display:none;text-align:center;margin-top:10px}
.loader span{animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:0}50%{opacity:1}}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="overlay"></div>

<div class="container" id="login">
<div class="card">
<h2>AC PREMIUM BOT</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<div class="dashboard" id="dash">
<div class="top">
<h3>BOT ATIVO <span class="status">ONLINE</span></h3>
<div class="timer" id="timer">Pronto</div>
</div>

<select id="broker"><option>Quotex</option></select>

<select id="pair">
<option>EUR/USD</option><option>GBP/USD</option><option>USD/JPY</option>
<option>USD/CAD</option><option>AUD/USD</option><option>NZD/USD</option>
<option>USD/CHF</option><option>EUR/JPY</option><option>GBP/JPY</option>
<option>BTC/USD</option><option>ETH/USD</option><option>USD/BRL</option>
</select>

<button onclick="generate()">GERAR SINAL PREMIUM</button>

<div class="loader" id="loader">BOT ANALISANDO <span>.</span><span>.</span><span>.</span></div>

<div class="signal" id="signal">Aguardando sinal...</div>

<div class="history" id="history"></div>
</div>

<script>
let last=localStorage.getItem('last')||0
let countdown=0

function login(){
let e=email.value
let p=password.value
if(e==='gameresmael64@gmail.com' && p==='Vadinho92@'){
localStorage.setItem('logado',true)
show()
}else alert('Acesso negado')
}

function show(){login.style.display='none';dash.style.display='block'}

window.onload=()=>{if(localStorage.getItem('logado'))show();timerLoop()}

function timerLoop(){
setInterval(()=>{
if(countdown>0){countdown--;timer.innerText='Aguarde '+countdown+'s'}
else timer.innerText='Pronto'
},1000)
}

function fakeAnalysis(){
let trend=Math.random()
if(trend>0.6)return 'CALL'
if(trend<0.4)return 'PUT'
return Math.random()>0.5?'CALL':'PUT'
}

function generate(){
let now=Date.now()
if(now-last<100000){alert('Espere 100s');return}

last=now
localStorage.setItem('last',last)
countdown=100

loader.style.display='block'
signal.innerHTML='Analisando mercado...'

setTimeout(()=>{
loader.style.display='none'

let acc=[90,95,80,85,70,75]
let accuracy=acc[Math.floor(Math.random()*acc.length)]

let d=new Date()
d.setMinutes(d.getMinutes()+5)

let time=d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')
let dir=fakeAnalysis()
let pair=document.getElementById('pair').value

signal.innerHTML=`
<h3>ENTRADA CONFIRMADA</h3>
<p>Par: ${pair}</p>
<p>Horário: ${time}</p>
<p>Direção: ${dir}</p>
<p>Precisão: ${accuracy}%</p>
`

let div=document.createElement('div')
div.innerText=`${pair} | ${dir} | ${time} | ${accuracy}%`
history.prepend(div)

},3000)
}
</script>
</body>
</html>
